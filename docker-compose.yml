services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - smart-building-network

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:9093,CLIENT://:9092,CONTROLLER://:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9093,CLIENT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CLIENT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - smart-building-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
      KAFKA_CLUSTERS_0_READONLY: "false"
    networks:
      - smart-building-network

  mqtt-to-kafka:
    build: ./bridge
    container_name: mqtt-to-kafka
    restart: unless-stopped
    depends_on:
      - mqtt
      - kafka
    environment:
      MQTT_HOST: mqtt
      MQTT_PORT: "1883"
      MQTT_TOPIC: "iot/input"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9093"
      KAFKA_TOPIC: "iot.input"
    networks:
      - smart-building-network

  kafka-to-mqtt:
    build: ./bridge-out
    container_name: kafka-to-mqtt
    restart: unless-stopped
    depends_on:
      - mqtt
      - kafka
    environment:
      MQTT_HOST: mqtt
      MQTT_PORT: "1883"
      MQTT_TOPIC: "iot/alerts"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9093"
      KAFKA_TOPIC: "iot.alerts"
    networks:
      - smart-building-network

  ticker:
    build: ./ticker
    container_name: ticker
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      TICKER_ROOM_IDS: "CR-101,CR-102,CR-103,CR-104,CR-105"
      TICKER_SITE_ID: "MAIN"
      TICKER_BUILDING_IDS: "B01,B02,B03"
    networks:
      - smart-building-network

  siddhi-runner-1:
    image: siddhiio/siddhi-runner-alpine:latest
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      - JAVA_OPTS=-Xms512m -Xmx1024m
    volumes:
      - ./siddhi-apps:/home/siddhi_user/siddhi-runner/deployment/siddhi-files
      - ./siddhi-libs:/home/siddhi_user/siddhi-runner/lib
    networks:
      - smart-building-network

  siddhi-runner-2:
    image: siddhiio/siddhi-runner-alpine:latest
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      - JAVA_OPTS=-Xms512m -Xmx1024m
    volumes:
      - ./siddhi-apps:/home/siddhi_user/siddhi-runner/deployment/siddhi-files
      - ./siddhi-libs:/home/siddhi_user/siddhi-runner/lib
    networks:
      - smart-building-network

  siddhi-runner-3:
    image: siddhiio/siddhi-runner-alpine:latest
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      - JAVA_OPTS=-Xms512m -Xmx1024m
    volumes:
      - ./siddhi-apps:/home/siddhi_user/siddhi-runner/deployment/siddhi-files
      - ./siddhi-libs:/home/siddhi_user/siddhi-runner/lib
    networks:
      - smart-building-network

# 关键修复：指定使用外部已创建的网络
networks:
  smart-building-network:
    external: true
    driver: bridge

volumes:
  kafka_data:
    driver: local